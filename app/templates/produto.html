<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title> Kordonê Bijoux | E-comerce Oficial</title>
    <meta charset= "utf-8">
    <meta name = "viewport" content="width = device-width, initial-scale = 1.0">
    <meta name = "description" content= "Kordonê Bijoux - Produtos">
    <meta name = "author" content = "Theodoro Meiel">
    
   <link rel="stylesheet" href="{{url_for('static' , filename= 'css/style_header.css' )}}">
    <link rel="stylesheet" href="{{url_for('static' , filename= 'css/style_pesquisa.css' )}}">
    
    <link rel="stylesheet" href="{{url_for('static' , filename= 'css/style_dropdown.css' )}}">
    
    <link rel="stylesheet" href="{{url_for('static' , filename= 'css/style_produtos.css' )}}">
    
    
    
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    
    </head>
    <body>
      <header>
        {% include 'components/_header_interno.html' %}
      </header>
      <div class="pagina-produto">
        <!-- LADO ESQUERDO -->
        <div class="produto-imagem">
          <div class="botoes">
            <button id="ant" class="desativado">
              <i class="ri-arrow-left-s-line"></i>
            </button>
            <button id="prox">
              <i class="ri-arrow-right-s-line"></i>
            </button>
          </div>
          <img src="{{ url_for('static', filename='imagens/UPLOADS_FOTOS_BIJOUX/' ~ produto.imagens[0].url) }}" id="foto">
        </div>
        <!-- LADO DIREITO -->
        <div class="produto-info">
          <h1>{{ produto.nome }}</h1>
          <p class="preco">R$ {{ produto.preco }}</p>
          <p><strong>Material:</strong> {{ produto.material }}</p>
          <p><strong>Tamanho:</strong> {{ produto.tamanho }}</p>
          {% if produto.colecao %}
          <p><strong>Coleção:</strong> {{ produto.colecao.nome_colecao}}</p>
          {% endif %}
          <p><strong> Disponível(is):</strong> {{ produto.em_estoque }}</p>
          <!-- BOTÃO -->
          <form method="POST">
            <button type="submit">Adicionar ao carrinho</button>
            </form>
        </div>
    </div>
    <script>
      const imagens = [
        {% for img in produto.imagens %}
          "{{ url_for('static', filename='imagens/UPLOADS_FOTOS_BIJOUX/' ~ img.url) }}",
        {% endfor %}
        ];
    </script>
    <script src="{{url_for('static' , filename='Js/produto.js')}}"></script>
    <script src="{{url_for('static' , filename='Js/menu.js')}}"></script>
    
    </body>
</html>
