<!DOCTYPE HTML>
<html>
  <head lang="pt-br">
    <title> Coleções | Kordonê Bijoux</title>
    <meta charset= "utf-8">
    <meta name = "description" content="Kordonê Bijoux | Site Oficial">
    <meta name = "viewport" content="width = device-width , initial_scale = 1.0">
    <meta name = "description" content= "Kordonê Bijoux - Site oficial">
    <meta name = "keywords" content = "">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/Style_colecoes.css') }}">

  </head>
  <body>
    <header>
        {%include "components/_header.html"%}
    </header>
    <br>
    <h2> Seção das principais Coleções</h2>
    <br>
        <div>
      <ul id="lista-colecoes">
        {%for colecao in colecoes%}
        <li>
          <a href="/colecoes/{{colecao.id_colecao}}"> 
            <img src="{{ url_for('static', filename='imagens/UPLOADS_FOTOS_BIJOUX/' + colecao.capa_colecao) }}" alt="Capa da Coleção" width="450px" height="500px">
            <p>
              <strong> {{colecao.nome_colecao}}</strong>
            </p>
          </a>  
          </li>
        {%endfor%}
      </ul> 
      <br>
    </div> 
  </body>
</html>
