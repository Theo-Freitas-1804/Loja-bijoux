<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style_header.css') }}">
  <link rel="stylesheet" href="{{url_for('static' , filename='css/style_dropdown.css')}}">
  <link rel="stylesheet" href="{{url_for('static' , filename='css/style_pesquisa.css')}}">
  
  <link rel="stylesheet" href="{{url_for('static' , filename='css/style_novo_cupom.css')}}">
  
  
  
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    
</head>
<body>
  
  <header>
    {% include 'components/_header_interno.html' %}
  </header>
  
  <form action="{{ url_for('admin.criar_cupom') }}" method="post" id="form-cupom">
    <input type="text" name="nome" placeholder="Nome do cupom">
    <label>
      <input type="checkbox" id="sem-expiracao">
      Sem expiração
    </label>
    <input type="date" name="expira" id="campo-data">
    
    <div class="grupo-inputs">
      <label>
        <input type="radio" name="tipo" value="porcentagem">
        Porcentagem (%)
    </label>
    <label>
      <input type="radio" name="tipo" value="fixo">
      Valor fixo (R$)
      </label>
    </div>
    
  <div id="porcentagem" class="escondido">
    <input 
      type="number" 
      name="valor_porcentagem" 
      placeholder="Ex: 10 (%)"
      min="1"
      max="100"
    >
  </div>
  <div id="fixo" class="escondido">
    <input 
      type="number" 
      name="valor_fixo" 
      placeholder="Ex: 20 (R$)"
      min="1"
      step="0.01"
    >
  </div>
  <button type="submit" class="enviar">Criar cupom</button>
</form>

<script src="{{ url_for('static', filename='Js/novo_cupom.js') }}"></script>
</body>
</html>
