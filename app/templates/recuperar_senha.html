<!DOCTYPE html>
<html lang="pt-br">
<head>
  <title>Recuperar Senha | Kordonê Bijoux</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="{{ url_for('static', filename='css/style_senha.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style_header.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style_pesquisa.css') }}">

  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>

<body>
  <header>
    {% include "components/_header_interno.html" %}
  </header>

  <h3>Recupere sua senha</h3>

  <!-- ===================== -->
  <!-- ETAPA 1: EMAIL -->
  <!-- ===================== -->
  <div id="etapa-email" class="{% if mostrar_codigo or mostrar_senha %}escondido{% endif %}">
    <form class="form-recuperacao" method="POST" action="{{ url_for('senha.gerar_codigo_senha') }}">
      <input type="email" name="email" placeholder="Digite seu email" required>
      <button type="submit">Receber Código</button>
    </form>
  </div>

  <!-- ===================== -->
  <!-- ETAPA 2: CÓDIGO -->
  <!-- ===================== -->
  <div id="etapa-codigo" class="{% if not mostrar_codigo or mostrar_senha %}escondido{% endif %}">
    <h4>Digite o código enviado</h4>

    <form class="form-recuperacao" method="POST" action="{{ url_for('senha.validar_codigo') }}">
      
      <!-- Código completo (hidden) -->
      <input type="hidden" name="token" id="codigo-completo">

      <div class="codigo">
        <input type="text" maxlength="1">
        <input type="text" maxlength="1">
        <input type="text" maxlength="1">
        <input type="text" maxlength="1">
        <input type="text" maxlength="1">
        <input type="text" maxlength="1">
      </div>

      <button type="submit">Validar código</button>
    </form>
  </div>

  <!-- ===================== -->
  <!-- ETAPA 3: NOVA SENHA -->
  <!-- ===================== -->
  <div id="nova-senha" class="{% if mostrar_senha != True %}escondido{% endif %}">
    
    <form class="form-recuperacao" method="POST" action="{{ url_for('senha.salvar_senha_nova') }}">
      
      <!-- Token vem do backend -->
      <input type="hidden" name="token" value="{{ token }}">

      <label>Redefina sua senha</label>

      <input type="password" name="senhanova" placeholder="Nova senha" required>
      <input type="password" name="confirmar" placeholder="Confirmar senha" required>

      <button type="submit">Salvar nova senha</button>
    </form>

  </div>

  <!-- ===================== -->
  <!-- JS -->
  <!-- ===================== -->
  <script>
    const inputs = document.querySelectorAll(".codigo input");
    const hiddenInput = document.getElementById("codigo-completo");

    inputs.forEach((input, index) => {

      input.addEventListener("input", () => {
        input.value = input.value.replace(/\D/g, "").slice(0, 1);

        if (input.value && index < inputs.length - 1) {
          inputs[index + 1].focus();
        }

        atualizarCodigo();
      });

      input.addEventListener("keydown", (e) => {
        if (e.key === "Backspace" && input.value === "" && index > 0) {
          inputs[index - 1].focus();
        }
      });

    });

    function atualizarCodigo() {
      let codigo = "";
      inputs.forEach(input => codigo += input.value);
      hiddenInput.value = codigo;
    }
  </script>

</body>
</html>
